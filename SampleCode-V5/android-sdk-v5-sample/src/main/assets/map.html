<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { padding: 0; margin: 0; background: #111; overflow: hidden; }
        #map { height: 100vh; width: 100vw; }
        .drone-icon { transition: transform 0.2s linear; }
        #status-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0ff;
            font-family: monospace;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border: 1px solid #0ff;
            z-index: 1000;
            pointer-events: none;
        }
        /* Tactical Popup Styling */
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: rgba(10, 15, 20, 0.95) !important;
            color: #0ff !important;
            border: 1px solid #0ff;
            border-radius: 4px;
        }
        .leaflet-popup-content {
            margin: 12px;
            font-family: 'Courier New', Courier, monospace;
        }
        .popup-title {
            font-weight: bold;
            font-size: 14px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            margin-bottom: 8px;
            padding-bottom: 4px;
        }
        .popup-label {
            font-size: 10px;
            color: #aaa;
            text-transform: uppercase;
        }
        .popup-input {
            background: #000;
            border: 1px solid #0ff;
            color: #0ff;
            padding: 4px;
            font-size: 14px;
            font-weight: bold;
            width: 60px;
            outline: none;
        }
        .popup-btn-delete {
            margin-top: 10px;
            background: rgba(255, 50, 50, 0.2);
            color: #ff5555;
            border: 1px solid #ff5555;
            width: 100%;
            padding: 5px;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 2px;
        }
        .popup-btn-delete:active {
            background: #ff5555;
            color: #000;
        }
    </style>
</head>
<body>
    <div id="status-msg">WAITING FOR GPS...</div>
    <div id="map"></div>
    <script>
        var map = L.map('map', {
            zoomControl: false,
            attributionControl: false,
            tap: false
        }).setView([0, 0], 2);

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19,
            minZoom: 2
        }).addTo(map);

        var droneIcon = L.divIcon({
            className: 'drone-icon',
            html: '<svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z" fill="#00FFFF" stroke="#000" stroke-width="1"/></svg>',
            iconSize: [30, 30],
            iconAnchor: [15, 15]
        });

        var marker = L.marker([0, 0], { icon: droneIcon, opacity: 0 }).addTo(map);
        
        var controllerIcon = L.divIcon({
            className: 'controller-icon',
            html: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="8" fill="#0ff" stroke="#000" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="#FFF"/></svg>',
            iconSize: [24, 24],
            iconAnchor: [12, 12]
        });
        var controllerMarker = L.marker([0, 0], { icon: controllerIcon, opacity: 0 }).addTo(map);

        var isFirstLocation = true;
        var isDrawMode = false;
        var waypoints = [];
        var waypointLayer = L.layerGroup().addTo(map);
        var pathLine = L.polyline([], { color: '#0ff', weight: 3, dashArray: '5, 10' }).addTo(map);
        var polygonArea = L.polygon([], { color: '#0ff', weight: 1, fillOpacity: 0.2 }).addTo(map);

        function setDrawMode(enabled) {
            isDrawMode = enabled;
            syncWaypoints();
        }

        function clearAll() {
            waypoints = [];
            waypointLayer.clearLayers();
            pathLine.setLatLngs([]);
            polygonArea.setLatLngs([]);
            syncWaypoints();
        }

        function updateLocation(lat, lng, heading) {
            if (lat === 0 && lng === 0) return;
            document.getElementById('status-msg').style.display = 'none';
            marker.setOpacity(1);
            var newLatLng = new L.LatLng(lat, lng);
            marker.setLatLng(newLatLng);
            var iconElement = document.querySelector('.drone-icon svg');
            if (iconElement) iconElement.style.transform = 'rotate(' + heading + 'deg)';
            if (isFirstLocation) {
                map.setView(newLatLng, 18);
                isFirstLocation = false;
            } else {
                map.panTo(newLatLng);
            }
        }

        function updateControllerLocation(lat, lng) {
            if (lat === 0 && lng === 0) return;
            controllerMarker.setOpacity(1);
            controllerMarker.setLatLng([lat, lng]);
        }

        map.on('contextmenu', function(e) {
            addWaypoint(e.latlng.lat, e.latlng.lng);
        });

        // Optional: prevent default context menu
        window.oncontextmenu = function() { return false; }

        function addWaypoint(lat, lng) {
            var index = waypoints.length + 1;
            var wpIcon = L.divIcon({
                className: 'wp-icon',
                html: '<div style="background:#0ff; color:#000; width:24px; height:24px; border-radius:50%; border:2px solid #000; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:12px;">' + index + '</div>',
                iconSize: [24, 24],
                iconAnchor: [12, 12]
            });

            var wpMarker = L.marker([lat, lng], {
                icon: wpIcon,
                draggable: true
            }).addTo(waypointLayer);

            var wp = { lat: lat, lng: lng, alt: 100.0, marker: wpMarker };
            waypoints.push(wp);

            wpMarker.bindPopup(`
                <div class="popup-title">WAYPOINT ${index}</div>
                <div class="popup-label">Target Altitude</div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <input type="number" class="popup-input" value="100.0" onchange="updateWpAlt(${index-1}, this.value)">
                    <span style="font-size:12px;">METERS</span>
                </div>
                <button class="popup-btn-delete" onclick="removeWaypointByIndex(${index-1})">Terminate Waypoint</button>
            `);

            wpMarker.on('dragend', function(e) {
                var pos = wpMarker.getLatLng();
                wp.lat = pos.lat;
                wp.lng = pos.lng;
                syncWaypoints();
            });

            syncWaypoints();
        }

        function updateWpAlt(idx, val) {
            if (waypoints[idx]) {
                waypoints[idx].alt = parseFloat(val);
                syncWaypoints();
            }
        }

        function removeWaypointByIndex(idx) {
            if (waypoints[idx]) {
                removeWaypoint(waypoints[idx]);
            }
        }

        function removeFirstWaypoint() {
            if (waypoints.length > 0) {
                removeWaypoint(waypoints[0]);
            }
        }

        function removeWaypoint(wp) {
            waypointLayer.removeLayer(wp.marker);
            waypoints = waypoints.filter(w => w !== wp);
            waypoints.forEach((w, i) => {
                var idx = i + 1;
                w.marker.setPopupContent(`
                    <div class="popup-title">WAYPOINT ${idx}</div>
                    <div class="popup-label">Target Altitude</div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <input type="number" class="popup-input" value="${w.alt}" onchange="updateWpAlt(${i}, this.value)">
                        <span style="font-size:12px;">METERS</span>
                    </div>
                    <button class="popup-btn-delete" onclick="removeWaypointByIndex(${i})">Terminate Waypoint</button>
                `);
                w.marker.setIcon(L.divIcon({
                    className: 'wp-icon',
                    html: '<div style="background:#0ff; color:#000; width:24px; height:24px; border-radius:50%; border:2px solid #000; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:12px;">' + idx + '</div>',
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                }));
            });
            syncWaypoints();
        }

        function syncWaypoints() {
            var latlngs = waypoints.map(w => [w.lat, w.lng]);
            pathLine.setLatLngs(latlngs);
            
            if (isDrawMode) {
                polygonArea.setLatLngs(latlngs);
            } else {
                polygonArea.setLatLngs([]);
            }

            if (window.Android) {
                var data = waypoints.map(w => ({ lat: w.lat, lng: w.lng, alt: w.alt }));
                window.Android.onWaypointsChanged(JSON.stringify(data));
            }
        }

        // Called from Android
        function setGridPoints(json) {
            var points = JSON.parse(json);
            clearAll();
            points.forEach(p => {
                var dotIcon = L.divIcon({
                    className: 'dot-icon',
                    html: '<div style="background:#FFF; width:6px; height:6px; border-radius:50%; border:1px solid #000;"></div>',
                    iconSize: [6, 6],
                    iconAnchor: [3, 3]
                });
                L.marker([p.lat, p.lng], { icon: dotIcon }).addTo(waypointLayer);
            });
            
            // Draw the grid line
            var gridLine = L.polyline(points.map(p => [p.lat, p.lng]), { color: '#FFF', weight: 2 }).addTo(waypointLayer);
            
            // Zoom to fit
            if (points.length > 0) {
                var bounds = L.latLngBounds(points.map(p => [p.lat, p.lng]));
                map.fitBounds(bounds, { padding: [50, 50] });
            }
        }
    </script>
</body>
</html>
